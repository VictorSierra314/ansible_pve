---
# # Set the account id used by proxmox api to run all the VM deployment tasks. The secret is protected with a vault encryption.
# pve_api_user:
# pve_api_token:
# pve_api_secret: !vault |
#     XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
#     XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
#     XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
# pve_api_node:            # Set the proxmox node FQDN used to execute all the API calls
# pve_cert_validation: # Boolean - Enable/Disable proxmox node HTTPS certificate verification
# smtp_host:               # SMTP server used to relay any email
# smtp_port:               # SMTP server port
# smtp_user:               # Default omit - SMTP user
# smtp_password:           # Default omit - SMTP password
# smtp_sec_mode:           # alway/try/never/starttls - Set how the email module will handle the encrypted session.
