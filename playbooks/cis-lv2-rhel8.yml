---
# https://github.com/RedHatOfficial/ansible-role-rhel8-cis
- name: CIS Red Hat Enterprise Linux 8 Benchmark for Level 2 - Server
  hosts: all
  become: true
  ignore_errors: true
  gather_facts: true
  pre_tasks:
    - name: Ensure --limit is used
      run_once: true
      ansible.builtin.assert:
        that:
          - ansible_limit is defined
  tasks:
    - name: Apply CIS Lv2 Server RHEL 8
      when:
        - ansible_distribution == "RedHat"
        - ansible_distribution_major_version == '8'
      ansible.builtin.include_role:
        name: ansible-role-rhel8-cis
