---
# tasks file for pve_hypervisor_rolling_upgrade
- name: Gather ansible log path
  register: ansible_log
  delegate_to: localhost
  run_once: true
  ansible.builtin.find:
    paths: /var/log/ansible/
    file_type: file
    patterns: "monthly_{{ inventory_hostname }}*"
    age: -1d

# ============================================================
# BLOCK 1: Upgrade node first, migrate VMs only if reboot needed
# ============================================================
- name: Upgrade node first, migrate VMs only if reboot needed
  when: upgrade_with_vms | default('true') | bool
  block:
    - name: Node upgrade
      ansible.builtin.include_tasks: 1_node_upgrade.yml

    - name: Migrate all VM before the reboot
      when:
        - migrate_vm | default('true') | bool
        - reboot_check.rc != 0
      ansible.builtin.include_tasks: 2_vm_migration.yml

    - name: Set Ceph flags
      when:
        - ceph_storage | default('false') | bool
        - reboot_check.rc != 0
      ansible.builtin.include_tasks: 3_set_ceph_flags.yml

    - name: Reboot the node
      when:
        - reboot_node | default('true') | bool
        - reboot_check.rc != 0
      register: node_reboot_out
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_delay | default('1800') }}"

    - name: Remove unused dependency
      when:
        - pve_upgrade.changed
        - rm_old_dependency | default('false') | bool
      ansible.builtin.apt:
        autoremove: true

    - name: Migrate VM back to the node
      when:
        - migrate_vm | default('true') | bool
        - reboot_check.rc != 0
      ansible.builtin.include_tasks: 4_vm_migration_back.yml

# ============================================================
# BLOCK 2: Migrate all VMs first, then upgrade node
# ============================================================
- name: Migrate all VMs first, then upgrade node
  when: not upgrade_with_vms | default('true') | bool
  block:
    - name: Migrate all VM before upgrade
      when: migrate_vm | default('true') | bool
      ansible.builtin.include_tasks: 2_vm_migration.yml

    - name: Node upgrade
      ansible.builtin.include_tasks: 1_node_upgrade.yml

    - name: Set Ceph flags
      when:
        - ceph_storage | default('false') | bool
        - reboot_check.rc != 0
      ansible.builtin.include_tasks: 3_set_ceph_flags.yml

    - name: Reboot the node
      when:
        - reboot_node | default('true') | bool
        - reboot_check.rc != 0
      register: node_reboot_out
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_delay | default('1800') }}"

    - name: Remove unused dependency
      when:
        - pve_upgrade.changed
        - rm_old_dependency | default('false') | bool
      ansible.builtin.apt:
        autoremove: true

    - name: Migrate VM back to the node
      when: migrate_vm | default('true') | bool
      ansible.builtin.include_tasks: 4_vm_migration_back.yml

- name: Post upgrade tasks, checks, ceph flag disable, vm migration back to node
  ansible.builtin.include_tasks: 5_post_upgrade_tasks.yml
