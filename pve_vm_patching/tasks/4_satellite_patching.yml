---
- name: SATELITTE | Patch satellite instances
  register: rhel_patch_out
  changed_when: rhel_patch_out.rc == 78 or rhel_patch_out.rc == 0
  failed_when: rhel_patch_out.stderr | length > 0
  ansible.builtin.shell: |
    satellite-maintain update check -y 2>&1
    echo "======================== Exit code for check: $?"
    sleep 1
    satellite-maintain update run -y 2>&1
    echo "======================== Exit code for run: $?"

- name: SATELITTE | DEBUG | Print out yum output
  when:
    - rhel_patch_out.results is defined
    - print_patching_output|default('false')|bool
  ansible.builtin.debug:
    var: rhel_patch_out.results
